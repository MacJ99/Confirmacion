<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Confirma | Citlali & Marcos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ballet:opsz@16..72&family=Bruno+Ace+SC&family=Monsieur+La+Doulaise&family=Nabla:EDPT@132&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --accent: #b99f4b;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0
    }

    html,body{
      height:100%;
      font-family:Montserrat,system-ui,Arial;
      overflow-x:hidden;
    }

    .bg-img{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      background:url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjLgud9niXcTbcXZAJg4Jjiih8r5OonD-YSz0nSFXeW4nrfChxAsprnMS3Duh2TMBTkxVwGyGZahJmDMvlVpO4v6GAgG0Fy7gCNwVoZfN-i_VsD66mDWQl4jdukS9AdNHnl9VLiiiOn589T4wLdXwflAJd7PHmdbIfQzAWkD8P__BZPglAvXjG-bnRedlk/s6000/DSC02108.jpg') center/cover no-repeat;
      z-index:-3;
    }

    .back-tint{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,0.45);
      backdrop-filter: blur(2px);
      z-index:-2;
    }

    .container{
      width:min(1100px,94%);
      margin:auto;
      padding:4rem 1.5rem;
      text-align:center;
    }

    h1{
      font-family:'Great Vibes',cursive;
      font-size:4.2rem;
      color:var(--accent);
      margin-bottom:.5rem;
      text-shadow:0 8px 22px rgba(0,0,0,0.25);
    }

    p{
      color:#0009;
      margin:.3rem 0;
      font-weight:300;
    }

    /* TEXTO LLAMATIVO */

    .scroll-invite{
      margin-top:18px;
      margin-bottom:25px;
      font-family: "Bruno Ace SC", sans-serif;
  font-weight: 400;
  font-style: normal;
      font-size:1.15rem;
      font-weight:700;
      color:#7d6430;
      text-shadow:0 3px 12px rgba(255,255,255,.8);
      animation:floatText 2s ease-in-out infinite;
    }

    .scroll-invite span{
      display:inline-block;
      margin-top:10px;
      font-size:1.4rem;
      color:var(--accent);
      animation:bounceArrow .8s infinite;
    }

    @keyframes floatText{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-8px);
      }
    }

    @keyframes bounceArrow{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(12px);
      }
    }

    .glass{
      margin-top:12rem;
      width:100%;
      max-width:900px;
      margin-inline:auto;
      padding:1rem;
      border-radius:10px;
      background:rgba(255,255,255,0.20);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.4);
    }

    .digits{
      display:flex;
      justify-content:space-between;
      gap:.6rem;
    }

    .unit{
      text-align:center;
      flex:1;
    }

    .value{
      font-size:3.4rem;
      font-weight:800;
      color:#111;
    }

    .seconds{
      color:var(--accent);
    }

    .label{
      margin-top:.3rem;
      letter-spacing:3px;
      font-size:.8rem;
      color:#444;
    }

    /* BOTÓN WHATSAPP */

    .confirmar{
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-top:40px;
      padding:18px 38px;
      background:linear-gradient(135deg,#25D366,#128C7E);
      color:white;
      text-decoration:none;
      font-size:1.1rem;
      font-weight:800;
      border-radius:60px;
      box-shadow:0 0 25px rgba(37,211,102,.5);
      transition:.3s;
      animation:pulse 1.8s infinite;
    }

    .confirmar:hover{
      transform:translateY(-4px) scale(1.05);
      box-shadow:0 0 35px rgba(37,211,102,.8);
    }

    @keyframes pulse{
      0%{
        box-shadow:0 0 0 0 rgba(37,211,102,.6);
      }
      70%{
        box-shadow:0 0 0 18px rgba(37,211,102,0);
      }
      100%{
        box-shadow:0 0 0 0 rgba(37,211,102,0);
      }
    }

    .music{
      position:fixed;
      left:50%;
      bottom:22px;
      transform:translateX(-50%);
      background:#fff;
      border-radius:50%;
      padding:.45rem;
      border:1px solid #0001;
      display:flex;
      z-index:5;
      backdrop-filter:blur(4px);
      cursor:pointer;
    }

    @media(max-width:780px){

      h1{
        font-size:3rem;
      }

      .value{
        font-size:2.3rem;
      }

      .digits{
        gap:.2rem;
      }

      .confirmar{
        font-size:.95rem;
        padding:15px 25px;
      }

      .scroll-invite{
        font-size:1rem;
      }

      .scroll-invite span{
        font-size:1.2rem;
      }
    }

  </style>
</head>

<body>

<div class="bg-img"></div>
<div class="back-tint"></div>

<div class="container">

  <h1>Citlali & Marcos</h1>

  <p>¡Nos casamos! — 25 / julio / 2026</p>

  <!-- TEXTO NUEVO LLAMATIVO -->
  <div class="scroll-invite">
    Por Favor Confirma antes del 1 de julio 🙌
    <br>
    <span>👇 Confirma tu asistencia 👇</span>
  </div>

  <div class="glass">
    <div class="digits">

      <div class="unit">
        <div class="value" id="days">0</div>
        <div class="label">DÍAS</div>
      </div>

      <div class="unit">
        <div class="value" id="hours">00</div>
        <div class="label">HORAS</div>
      </div>

      <div class="unit">
        <div class="value" id="minutes">00</div>
        <div class="label">MINUTOS</div>
      </div>

      <div class="unit">
        <div class="value seconds" id="seconds">00</div>
        <div class="label">SEGUNDOS</div>
      </div>

    </div>
  </div>

  <!-- BOTÓN WHATSAPP -->

  <a
    class="confirmar"
    href="https://wa.me/527151033029?text=Hola%20Citlali%20y%20Marcos,%20confirmo%20mi%20asistencia%20a%20su%20boda."
    target="_blank"
  >
    💍 CONFIRMAR ASISTENCIA
  </a>

</div>

<audio id="bgm" src="audio.mp3" loop preload="none"></audio>

<button class="music" id="musicBtn">
  ▶
</button>

<script>

  /* FECHA: 25 JULIO 2026 */

  const target = new Date("2026-07-25T00:00:00");

  const days = document.getElementById("days");
  const hours = document.getElementById("hours");
  const minutes = document.getElementById("minutes");
  const seconds = document.getElementById("seconds");

  function pad(n){
    return String(n).padStart(2,'0');
  }

  function updateTimer(){

    const now = new Date();
    let diff = target.getTime() - now.getTime();

    if(diff <= 0){
      days.textContent = "0";
      hours.textContent = "00";
      minutes.textContent = "00";
      seconds.textContent = "00";
      return;
    }

    const d = Math.floor(diff / 86400000);
    diff %= 86400000;

    const h = Math.floor(diff / 3600000);
    diff %= 3600000;

    const m = Math.floor(diff / 60000);
    diff %= 60000;

    const s = Math.floor(diff / 1000);

    days.textContent = d;
    hours.textContent = pad(h);
    minutes.textContent = pad(m);
    seconds.textContent = pad(s);
  }

  updateTimer();
  setInterval(updateTimer,1000);

  /* Música */

  const btn = document.getElementById("musicBtn");
  const audio = document.getElementById("bgm");

  let playing = false;

  btn.onclick = () => {

    if(!playing){
      audio.play();
      playing = true;
      btn.textContent = "⏸";
    }else{
      audio.pause();
      playing = false;
      btn.textContent = "▶";
    }

  };

</script>

</body>
</html>
